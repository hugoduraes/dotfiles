- name: set computer name
  become: true
  ansible.builtin.shell: scutil --set ComputerName "{{ computer_name }}"
    && scutil --set HostName "{{ computer_name }}"
    && scutil --set LocalHostName "{{ computer_name }}"
  when: inventory_hostname != 'work'

# macOS defaults list here:
# https://macos-defaults.com/

# Screenshots
- name: save screenshots to downloads
  ansible.builtin.command: defaults write com.apple.screencapture "location" -string "~/Downloads"

- name: save screenshots in PNG format
  ansible.builtin.command: defaults write com.apple.screencapture "type" -string "png"

- name: disable shadow in screenshots
  ansible.builtin.command: defaults write com.apple.screencapture "disable-shadow" -bool "true"

# Dock
- name: automatically hide and show the dock
  ansible.builtin.command: defaults write com.apple.dock "autohide" -bool "true"

- name: set the icon size of dock items to 28 pixels
  ansible.builtin.command: defaults write com.apple.dock "tilesize" -int "28"

- name: hide recently used apps in a separate section of the dock
  ansible.builtin.command: defaults write com.apple.dock "show-recents" -bool "false"

# Keyboard
- name: disable press-and-hold for keys in favor of key repeat
  ansible.builtin.command: defaults write NSGlobalDomain "ApplePressAndHoldEnabled" -bool "false"

- name: set Fn key to show emoji & symbols
  ansible.builtin.command: defaults write com.apple.HIToolbox AppleFnUsageType -int "2"

# Finder
- name: set the default view style to be column view
  ansible.builtin.command: defaults write com.apple.finder "FXPreferredViewStyle" -string "clmv"

- name: set visibility for hard drives, servers and removable media icons on the desktop
  ansible.builtin.shell:
    defaults write com.apple.finder "ShowExternalHardDrivesOnDesktop" -bool "true"
    && defaults write com.apple.finder "ShowHardDrivesOnDesktop" -bool "false"
    && defaults write com.apple.finder "ShowMountedServersOnDesktop" -bool "false"
    && defaults write com.apple.finder "ShowRemovableMediaOnDesktop" -bool "true"

- name: show status bar
  ansible.builtin.command: defaults write com.apple.finder "ShowStatusBar" -bool "true"

- name: search the current folder by default
  ansible.builtin.command: defaults write com.apple.finder "FXDefaultSearchScope" -string "SCcf"

- name: automatically resize columns to fit content
  ansible.builtin.command: defaults write com.apple.finder "_FXEnableColumnAutoSizing" -bool "true"

- name: apply changes
  ansible.builtin.command: "killall {{ item }}"
  with_items:
    - Dock
    - SystemUIServer
    - Finder
